<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Monitor</title>
  <style>
    body { background-color: #222; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 20px; margin: 0; }
    .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    h2 { margin: 0; }

    .order-card { background: #333; border: 1px solid #444; border-radius: 8px; margin-bottom: 15px; padding: 15px; border-left: 5px solid #3b82f6; transition: all 0.3s ease; }
    .new-order-flash { animation: flash 1s ease-out; }
    @keyframes flash { 0% { background: #3b82f6; } 100% { background: #333; } }

    .order-table { font-size: 1.4rem; font-weight: bold; background: #3b82f6; color: #fff; padding: 2px 8px; border-radius: 4px; margin-right: 10px; }
    .order-time { font-size: 1rem; color: #aaa; margin-left: 10px; }
    .order-user { font-size: 0.9rem; color: #aaa; display: block; margin-top: 5px; }
    .order-items { font-size: 1.2rem; margin: 10px 0; font-weight: bold; }
    .btn-done { width: 100%; height: 50px; font-size: 1.2rem; font-weight: bold; }

    .history-section { margin-top: 50px; border-top: 1px dashed #555; padding-top: 20px; opacity: 0.6; }
    .history-card { background: #2a2a2a; border: 1px solid #333; margin-bottom: 10px; padding: 10px; border-radius: 5px; }

    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: inherit; }
    .btn-outline { background: transparent; border: 1px solid #666; color: #fff; }
    .btn-outline:hover { border-color: #aaa; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-dark { background: #444; border: 1px solid #666; color: #fff; }
    .btn-refresh { background: transparent; border: 1px solid #666; color: #fff; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* メニュー管理 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #333; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; padding: 24px; }
    .modal-box h3 { margin-top: 0; }
    .menu-row { border-bottom: 1px solid #444; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    .form-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .form-switch input { opacity: 0; width: 0; height: 0; }
    .form-switch .slider { position: absolute; cursor: pointer; inset: 0; background: #666; border-radius: 24px; transition: 0.3s; }
    .form-switch .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    .form-switch input:checked + .slider { background: #ef4444; }
    .form-switch input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>

<div style="max-width:800px; margin:0 auto;">
  <div class="header-area">
    <div class="header-left">
      <h2>🍽 Kitchen Monitor</h2>
      <button class="btn btn-dark" onclick="openMenuManager()">📝 メニュー管理</button>
      <button class="btn btn-outline" id="btn-sound" onclick="toggleSound()">🔇 通知OFF</button>
    </div>
    <button class="btn btn-refresh" onclick="loadOrders(true)" id="btn-refresh">🔄 更新</button>
  </div>

  <div id="order-list">
    <div style="text-align:center; color:#888; margin-top:40px;">読み込み中...</div>
  </div>

  <div class="history-section">
    <h5>🏁 直近の履歴</h5>
    <div id="done-list"><div style="color:#888; font-size:14px;">まだありません</div></div>
  </div>
</div>

<!-- メニュー管理モーダル -->
<div class="modal-overlay" id="menuModal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3 style="margin:0;">📝 メニュー管理</h3>
      <button class="btn btn-outline" onclick="closeMenuManager()">✕</button>
    </div>
    <div style="color:#aaa; font-size:13px; margin-bottom:12px;">赤スイッチ＝売り切れ</div>
    <div id="owner-menu-list"><div style="text-align:center; padding:30px 0; color:#888;">読み込み中...</div></div>
  </div>
</div>

<script src="config.js"></script>
<script>
  var previousOrderIds = new Set();
  var isSoundOn = false;
  var isFirstLoad = true;
  var audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

  window.onload = function() {
    if (typeof GAS_API_URL === 'undefined') { alert("config.js error"); return; }
    loadOrders();
    setInterval(function() { loadOrders(false); }, 15000);
  };

  function toggleSound() {
    isSoundOn = !isSoundOn;
    var btn = document.getElementById('btn-sound');
    if (isSoundOn) {
      btn.textContent = "🔊 通知ON";
      btn.style.borderColor = "#22c55e";
      audio.volume = 0; audio.play().then(function() { audio.pause(); audio.volume = 1.0; });
    } else {
      btn.textContent = "🔇 通知OFF";
      btn.style.borderColor = "#666";
    }
  }

  function loadOrders(manual) {
    var btn = document.getElementById('btn-refresh');
    if (manual) { btn.textContent = "🔄 ..."; btn.classList.add('spin'); }
    fetch(GAS_API_URL + "?action=getOrders")
      .then(function(r) { return r.json(); })
      .then(function(d) {
        displayOrders(d.orders || []);
        if (manual) { btn.textContent = "🔄 更新"; btn.classList.remove('spin'); }
        isFirstLoad = false;
      })
      .catch(function() { if (manual) btn.textContent = "⚠️ エラー"; });
  }

  function displayOrders(orders) {
    var container = document.getElementById('order-list');
    var currentIds = new Set(orders.map(function(o) { return o.id; }));
    var hasNew = false;

    if (!orders.length) {
      container.innerHTML = '<div style="text-align:center; color:#888; margin-top:40px;">現在、未提供の注文はありません ✅</div>';
    } else {
      var html = "";
      orders.forEach(function(order) {
        var isNew = !previousOrderIds.has(order.id) && !isFirstLoad;
        if (isNew) hasNew = true;
        var flashClass = isNew ? " new-order-flash" : "";
        var itemsHtml = order.items.map(function(item) { return '<div>・' + item + '</div>'; }).join("");
        html += '<div class="order-card' + flashClass + '" id="ocard-' + order.id + '">' +
          '<div style="display:flex; justify-content:space-between; align-items:start;">' +
          '<div><span class="order-table">Table ' + order.tableId + '</span><span class="order-time">' + order.time + '</span>' +
          '<span class="order-user">' + order.user + ' 様</span>' +
          (isNew ? '<span style="background:#ef4444;color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;margin-left:8px;">NEW!</span>' : '') +
          '</div></div>' +
          '<hr style="margin:8px 0; border-color:#555;">' +
          '<div class="order-items">' + itemsHtml + '</div>' +
          '<button class="btn btn-success btn-done" onclick="completeOrder(\'' + order.id + '\',\'' + order.user + '\')">提供完了</button>' +
          '</div>';
      });
      container.innerHTML = html;
    }

    if (hasNew && isSoundOn) { audio.currentTime = 0; audio.play().catch(function() {}); }
    previousOrderIds = currentIds;
  }

  function completeOrder(orderId, user) {
    var card = document.getElementById('ocard-' + orderId);
    if (card) card.style.opacity = "0.3";
    fetch(GAS_API_URL, { method: "POST", body: JSON.stringify({ action: "completeOrder", orderId: orderId }) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.status === "success") {
          if (card) card.remove();
          if (!document.querySelectorAll('.order-card').length) loadOrders();
          addDoneHistory(user);
        } else { alert("エラー"); loadOrders(); }
      });
  }

  function addDoneHistory(user) {
    var list = document.getElementById('done-list');
    if (list.querySelector('div[style]')) list.innerHTML = "";
    var now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    list.insertAdjacentHTML('afterbegin', '<div class="history-card"><div style="display:flex; justify-content:space-between; font-size:13px; color:#888;"><span>' + now + ' - ' + user + '</span><span>完了</span></div></div>');
  }

  // メニュー管理
  function openMenuManager() {
    document.getElementById('menuModal').classList.add('show');
    fetch(GAS_API_URL + "?action=getMenu").then(function(r) { return r.json(); }).then(function(d) { renderOwnerMenu(d); });
  }

  function closeMenuManager() {
    document.getElementById('menuModal').classList.remove('show');
  }

  function renderOwnerMenu(items) {
    var c = document.getElementById('owner-menu-list');
    var html = "";
    items.forEach(function(i) {
      var ch = i.isSoldOut ? "checked" : "";
      var st = i.isSoldOut ? "売切" : "販売中";
      var cl = i.isSoldOut ? "color:#ef4444;" : "color:#22c55e;";
      html += '<div class="menu-row"><div><strong>' + i.name + '</strong></div>' +
        '<div style="display:flex; align-items:center; gap:12px;">' +
        '<span style="font-size:13px;' + cl + '" id="st-' + i.id + '">' + st + '</span>' +
        '<label class="form-switch"><input type="checkbox" ' + ch + ' onchange="toggleStock(\'' + i.id + '\')"><span class="slider"></span></label>' +
        '</div></div>';
    });
    c.innerHTML = html;
  }

  function toggleStock(id) {
    var checkbox = document.querySelector('#owner-menu-list input[onchange*="' + id + '"]');
    var st = document.getElementById('st-' + id);
    var isSoldOut = checkbox.checked;
    st.textContent = "...";
    fetch(GAS_API_URL, { method: "POST", body: JSON.stringify({ action: "updateStock", itemId: id, isSoldOut: isSoldOut }) })
      .then(function(r) { return r.json(); })
      .then(function() {
        st.textContent = isSoldOut ? "売切" : "販売中";
        st.style.color = isSoldOut ? "#ef4444" : "#22c55e";
      });
  }
</script>
</body>
</html>
